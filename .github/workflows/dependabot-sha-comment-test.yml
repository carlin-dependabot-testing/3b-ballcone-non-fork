# Test: Does the version comment style on a SHA-pinned action affect what Dependabot updates to?
# Both use the same old SHA (actions/checkout v4.0.0) but differ in comment style.

name: Dependabot SHA Comment Test

on:
  workflow_dispatch:

jobs:
  major-only-comment:
    name: "comment=v4 (major only)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2 # v4

  full-semver-comment:
    name: "comment=v4.0.0 (full semver)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2 # v4.0.0
